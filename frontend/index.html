<!doctype html>
<html lang="en">
  <head>
    <!-- Character encoding -->
    <meta charset="UTF-8" />
    
    <!-- Viewport for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Basic Meta Tags -->
    <meta name="description" content="Business Management System for managing Dashboard, Sales, Labour, Medicine, Expenses, Reports, and Authentication." />
    <meta name="keywords" content="business, management, sales, labour, expenses, reports, dashboard" />
    <meta name="author" content="Business Management System" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2d3748" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="BMS" />
    
    <!-- iOS PWA Meta Tags (Critical for iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BMS" />
    <link rel="apple-touch-icon" href="/icons/icon-144x144.png" />
    
    <!-- Apple Specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Business Management System" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-152x152.png" />
    
    <!-- Splash Screen (iOS) -->
    <link rel="apple-touch-startup-image" href="/screenshots/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/screenshots/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/screenshots/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <title>Business Management System</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Service Worker Registration and App Initialization -->
    <script type="module">
      import { registerServiceWorker } from './src/utils/pwaUtils.js';
      
      // Register service worker on page load
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          registerServiceWorker().catch(error => {
            console.error('Failed to register service worker:', error);
          });
        });
      }
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
