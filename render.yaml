services:
  # Backend Service
  - type: web
    name: village-khata-manager-backend
    env: node
    plan: starter
    buildCommand: cd backend && npm install && npm run prisma:generate
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: village-khata-manager-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5000

  # Frontend Service - Served as Static Site
  - type: web
    name: village-khata-manager-frontend
    env: node
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/dist -l 3000
    envVars:
      - key: VITE_API_URL
        value: https://village-khata-manager-backend.onrender.com/api

databases:
  - name: village-khata-manager-db
    databaseName: village_khata_manager
    user: khata_user
    region: oregon
    plan: free
